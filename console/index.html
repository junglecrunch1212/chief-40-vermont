<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Poopsy-In-A-Box v5</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=DM+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#FFFBF5; --bg-card:#FFFFFF; --bg-side:#FAF5F0; --bg-input:#F5F0EA; --bg-hover:#F0EBE4;
  --tx:#2D2926; --tx2:#6B5E54; --tx3:#9B8E82; --tx4:#C4B8AC;
  --bd:#E8E0D6; --bd2:#D4C9BC;
  --pink:#E8A0BF; --pink-bg:rgba(232,160,191,0.12); --pink-bg2:rgba(232,160,191,0.06);
  --lav:#B8A9C9; --lav-bg:rgba(184,169,201,0.12);
  --teal:#8EC5C0; --teal-bg:rgba(142,197,192,0.10);
  --grn:#7CB98F; --grn-bg:rgba(124,185,143,0.12);
  --warn:#E8C07D; --warn-bg:rgba(232,192,125,0.12);
  --err:#D4756B; --err-bg:rgba(212,117,107,0.10);
  --info:#89B4D4; --info-bg:rgba(137,180,212,0.10);
  --r:12px; --rs:8px;
  --sh:0 2px 8px rgba(45,41,38,0.06); --shc:0 4px 16px rgba(45,41,38,0.05);
  --head:'Fraunces',Georgia,serif; --body:'DM Sans',-apple-system,sans-serif; --mono:'JetBrains Mono',monospace;
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--tx);font-family:var(--body);-webkit-font-smoothing:antialiased;font-size:14px;line-height:1.5}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
@keyframes glow{0%,100%{box-shadow:0 0 0 0 rgba(232,160,191,0.15)}50%{box-shadow:0 0 0 8px rgba(232,160,191,0.15)}}
.fi{animation:fadeUp .4s ease-out}
.card{background:var(--bg-card);border:1px solid var(--bd);border-radius:var(--r);padding:20px;box-shadow:var(--shc);transition:border-color .2s}
.card:hover{border-color:var(--bd2)}
.card-flat{background:var(--bg-card);border:1px solid var(--bd);border-radius:var(--r);padding:20px}
.card-active{animation:glow 2s ease-in-out infinite}
input,textarea,select{background:var(--bg-input);border:1px solid var(--bd);border-radius:var(--rs);color:var(--tx);font-family:var(--body);font-size:14px;padding:10px 14px;outline:none;width:100%;transition:border-color .2s}
input:focus,select:focus,textarea:focus{border-color:var(--pink);box-shadow:0 0 0 3px rgba(232,160,191,0.15)}
button{font-family:var(--body);cursor:pointer;border:none;border-radius:var(--rs);font-size:14px;font-weight:500;padding:10px 18px;transition:all .15s ease}
button:disabled{opacity:.5;cursor:not-allowed}
.btn-p{background:var(--pink);color:#fff}.btn-p:hover:not(:disabled){background:#D990B0;transform:translateY(-1px);box-shadow:0 4px 12px rgba(232,160,191,0.3)}
.btn-s{background:transparent;color:var(--tx2);border:1px solid var(--bd)}.btn-s:hover:not(:disabled){border-color:var(--bd2);background:var(--bg-hover)}
.btn-g{background:var(--grn);color:#fff}.btn-g:hover:not(:disabled){background:#6DAA80}
.btn-d{background:var(--err-bg);color:var(--err)}.btn-d:hover:not(:disabled){background:rgba(212,117,107,0.18)}
.btn-sm{padding:6px 14px;font-size:13px}
.btn-y{background:var(--grn);color:#fff;padding:8px 20px;font-weight:600}.btn-y:hover:not(:disabled){background:#6DAA80}
.btn-n{background:var(--err-bg);color:var(--err);padding:8px 20px;font-weight:600}.btn-n:hover:not(:disabled){background:rgba(212,117,107,0.18)}
.badge{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:600;letter-spacing:.3px;padding:4px 10px;border-radius:20px}
.badge-pink{background:var(--pink-bg);color:var(--pink)}
.badge-lav{background:var(--lav-bg);color:var(--lav)}
.badge-grn{background:var(--grn-bg);color:var(--grn)}
.badge-warn{background:var(--warn-bg);color:#B8943D}
.badge-err{background:var(--err-bg);color:var(--err)}
.badge-info{background:var(--info-bg);color:var(--info)}
.badge-teal{background:var(--teal-bg);color:#5DA09A}
.shell{display:flex;height:100vh;overflow:hidden}
.sidebar{width:220px;min-width:220px;background:var(--bg-side);border-right:1px solid var(--bd);display:flex;flex-direction:column;padding:20px 0}
.main{flex:1;overflow:auto;padding:28px 36px;background:var(--bg)}
.nav-btn{display:flex;align-items:center;justify-content:space-between;width:100%;padding:10px 14px;margin-bottom:2px;border-radius:10px;background:transparent;color:var(--tx2);border:none;font-size:14px;font-weight:400;transition:all .15s;text-align:left}
.nav-btn.active{background:var(--pink-bg);color:#C47A9E;font-weight:600}
.nav-btn:hover:not(.active){background:var(--bg-hover)}
.nav-icon{display:flex;align-items:center;gap:12px}
.actor-btn{flex:1;padding:8px 4px;border-radius:8px;border:1px solid var(--bd);background:transparent;font-size:12px;color:var(--tx2);display:flex;flex-direction:column;align-items:center;gap:2px;transition:all .15s}
.actor-btn.active{border-color:var(--pink);background:var(--pink-bg);color:var(--pink);font-weight:600}
.pill-tabs{display:flex;gap:4px;margin-bottom:20px;overflow-x:auto;padding-bottom:4px}
.pill{padding:7px 16px;border-radius:20px;font-size:13px;font-weight:500;background:var(--bg-card);color:var(--tx2);border:1px solid var(--bd);cursor:pointer;white-space:nowrap;transition:all .15s}
.pill.active{background:var(--pink);color:#fff;border-color:var(--pink)}
table{width:100%;border-collapse:collapse}
th{text-align:left;padding:10px 14px;font-size:11px;font-weight:600;color:var(--tx3);text-transform:uppercase;letter-spacing:.3px}
td{padding:12px 14px}
thead tr{border-bottom:2px solid var(--bd)}
tbody tr{border-bottom:1px solid var(--bd);transition:background .15s}
tbody tr:hover{background:var(--bg-hover)}
.page-title{font-size:28px;font-weight:600;font-family:var(--head);letter-spacing:-.5px;margin-bottom:24px}
.section-label{font-size:11px;font-weight:600;color:var(--tx3);letter-spacing:.5px;text-transform:uppercase;margin-bottom:12px}
.spinner{width:32px;height:32px;border-radius:50%;border:3px solid var(--bd);border-top-color:var(--pink);animation:pulse 1s infinite;margin:60px auto}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--bd);border-radius:3px}
.degraded-banner{background:var(--warn-bg);color:#B8943D;padding:12px 20px;border-radius:10px;margin-bottom:20px;display:flex;align-items:center;gap:12px;font-size:13px;font-weight:500;border:1px solid var(--warn)}
.progress-dots{display:flex;gap:6px;overflow-x:auto;padding:12px 0;margin-bottom:16px}
.dot{width:10px;height:10px;border-radius:50%;cursor:pointer;transition:all .2s;flex-shrink:0}
.dot-endowed{background:var(--tx4);opacity:.5}
.dot-done{background:var(--grn)}
.dot-skipped{background:var(--warn)}
.dot-current{background:var(--pink);width:14px;height:14px;animation:pulse 2s infinite}
.dot-urgent{background:var(--err)}
.dot-pending{background:var(--bd2)}
.dot-capture{background:var(--warn)}
.badge-cap{background:var(--warn-bg);color:#B8943D}
.nb-btn{padding:10px 14px;border:1px solid var(--bd);border-radius:8px;background:transparent;font-size:13px;color:var(--tx2);cursor:pointer;transition:all .15s;white-space:nowrap}
.nb-btn.active{background:var(--pink-bg);border-color:var(--pink);color:var(--pink);font-weight:600}
.nb-btn:hover:not(.active){background:var(--bg-hover)}
.recipe-accent{border-left:3px solid var(--teal);background:var(--teal-bg)}
.triage-card{background:var(--bg-card);border:1px solid var(--bd);border-radius:var(--r);padding:24px;margin-bottom:16px;box-shadow:var(--shc)}
.sort-btn{padding:14px 18px;border:2px solid var(--bd);border-radius:10px;background:var(--bg-card);font-size:14px;font-weight:500;color:var(--tx2);cursor:pointer;transition:all .2s;text-align:center}
.sort-btn:hover{border-color:var(--pink);transform:translateY(-2px);box-shadow:0 4px 12px rgba(232,160,191,0.2)}
.sort-btn.selected{border-color:var(--pink);background:var(--pink);color:#fff;box-shadow:0 4px 12px rgba(232,160,191,0.3)}
.tv-scoreboard{background:#1A1714;color:#F5F0EA;min-height:100vh;padding:60px;font-size:18px}
.tv-scoreboard .huge{font-size:72px;font-weight:700;font-family:var(--head)}
.tv-scoreboard .big{font-size:48px;font-weight:600}
.tv-scoreboard .med{font-size:32px}
.child-view .sidebar{display:none!important}
.child-view .main{padding:0!important}
@media (max-width: 768px) {
  .shell { flex-direction: column; }
  .sidebar {
    width: 100%; min-width: 100%; height: auto;
    border-right: none; border-top: 1px solid var(--bd);
    flex-direction: row; padding: 6px 4px; overflow-x: auto;
    position: fixed; bottom: 0; left: 0; z-index: 100;
    background: var(--bg-side); order: 2;
  }
  .sidebar > div { display: flex; flex-direction: row; gap: 2px; width: 100%; }
  .sidebar .nav-btn {
    flex-direction: column; padding: 6px 4px; font-size: 10px;
    gap: 2px; min-width: 0; flex: 1; text-align: center; justify-content: center;
  }
  .sidebar .nav-btn .nav-icon { flex-direction: column; gap: 2px; }
  .sidebar .nav-btn .nav-icon svg { width: 18px; height: 18px; }
  .sidebar .section-label, .sidebar .actor-btn { display: none; }
  .main { padding: 14px 14px 80px 14px; order: 1; }
  .page-title { font-size: 22px; margin-bottom: 16px; }
  .card { padding: 14px; }
  table { font-size: 12px; }
  td, th { padding: 8px; }
  .pill-tabs { flex-wrap: nowrap; }
  .pill { font-size: 11px; padding: 6px 12px; }
  .tv-scoreboard { padding: 20px; }
  .tv-scoreboard .huge { font-size: 48px; }
}
</style>
</head>
<body>
<div id="degraded-warn" style="display:none" class="degraded-banner">
  ⚠️ Showing cached data — connection to backend lost
</div>
<div class="shell" id="shell">
  <nav class="sidebar" id="sidebar"></nav>
  <main class="main" id="main"></main>
</div>
<script>
window.onerror = function(msg,url,line,col,err) {
  document.body.innerHTML = '<pre style="padding:20px;color:red;font-size:14px">JS ERROR: '+msg+'\nLine: '+line+'\nCol: '+col+'\n'+(err?err.stack:'')+'</pre>';
};
window.addEventListener('unhandledrejection', function(e) {
  document.body.innerHTML = '<pre style="padding:20px;color:red;font-size:14px">UNHANDLED PROMISE: '+e.reason+'</pre>';
});
// ── State ──
const MEMBERS = [
  { id:'m-james', name:'James', role:'parent', emoji:'\uD83D\uDCAA', viewMode:'carousel' },
  { id:'m-laura', name:'Laura', role:'parent', emoji:'\u2696\uFE0F', viewMode:'compressed' },
  { id:'m-charlie', name:'Charlie', role:'child', emoji:'\uD83C\uDF1F', age:6, viewMode:'child' },
];
const NAV = [
  { id:'today', icon:'sun', label:'Today' },
  { id:'tasks', icon:'check-square', label:'Tasks' },
  { id:'schedule', icon:'calendar', label:'Schedule' },
  { id:'lists', icon:'list', label:'Lists' },
  { id:'comms', icon:'inbox', label:'Comms' },
  { id:'captures', icon:'book-open', label:'Captures' },
  { id:'chat', icon:'message-circle', label:'Chat' },
  { id:'scoreboard', icon:'trophy', label:'Scoreboard' },
  { id:'people', icon:'users', label:'People' },
  { id:'settings', icon:'settings', label:'Settings' },
];
const HIDDEN_FOR_CHILD = ['tasks', 'people', 'settings', 'captures', 'comms'];
const DOMAIN_BADGE = {household:'badge-lav',health:'badge-teal',finance:'badge-warn',family:'badge-pink',work:'badge-info',admin:'badge-grn',capture:'badge-warn'};
const ADAPTER_BADGE = {email:'badge-pink',imessage:'badge-lav',sms:'badge-teal',whatsapp:'badge-grn',voice:'badge-warn',webhook:'badge-info',manual:'badge-err'};
const SETTINGS_TABS = ['health','costs','models','sources','phases','config','budget','household','permissions','coaching','gates','channels','memory','captures'];
const SETTINGS_LABELS = {health:'System Health',costs:'Costs',models:'AI Models',sources:'Sources',phases:'Life Phases',config:'Config',budget:'Budget',household:'Household',permissions:'Permissions',coaching:'Coaching',gates:'Gates',channels:'Channels',memory:'Memory',captures:'Captures'};

let currentPage = 'today';
let currentActor = localStorage.getItem('pib-actor-override') || localStorage.getItem('pib-actor') || 'm-james';
let settingsTab = 'health';
let chatSessionId = 'sess-' + Date.now();
let chatMessages = [];
let chatStreaming = false;
let degradedMode = false;
let lastKnownData = {};
let streamIndex = 0;
let capturesNotebook = 'all';
let capturesView = 'browse';
let capturesSearch = '';
let triageIndex = 0;
let captureBadge = 0;

// Boot is deferred to end of script (after all const declarations)
// See bottom of file for: initApp() / renderTVScoreboard()

async function initApp() {
  await bootstrapIdentity();
  renderSidebar();
  renderPage();
  // Health polling
  setInterval(async()=>{
    try {
      const h = await GET('/api/health');
      if (degradedMode) { degradedMode = false; document.getElementById('degraded-warn').style.display='none'; }
      const pill = document.getElementById('health-pill');
      if(pill) { 
        const ok=h.status==='healthy'; 
        pill.style.background=ok?'var(--grn-bg)':'var(--err-bg)'; 
        pill.innerHTML=`<div style="width:7px;height:7px;border-radius:50%;background:${ok?'var(--grn)':'var(--err)'};animation:pulse 2s infinite"></div><span style="font-size:12px;color:${ok?'var(--grn)':'var(--err)'};font-weight:500">${ok?'System Healthy':'System Unhealthy'}</span>`; 
      }
    } catch{ 
      if(!degradedMode){ 
        degradedMode=true; 
        document.getElementById('degraded-warn').style.display='flex'; 
      } 
    }
  }, 300000); // 5 min
  // Capture badge polling
  setInterval(async()=>{
    try {
      const stats = await GET(`/api/captures/stats?member=${currentActor}`);
      captureBadge = stats.inbox_count || 0;
      renderSidebar();
    } catch(e) { /* ignore */ }
  }, 300000); // 5 min
}

// ── API Layer ──
async function api(path, opts = {}) {
  const viewAs = currentActor;
  const sep = path.includes('?') ? '&' : '?';
  const url = viewAs ? `${path}${sep}view_as=${viewAs}` : path;
  const res = await fetch(url, {
    headers: { 'Content-Type': 'application/json', ...opts.headers },
    ...opts,
  });
  if (res.status === 401) {
    document.body.innerHTML = '<div style="padding:60px;text-align:center;font-family:var(--body)"><h1 style="font-size:24px;margin-bottom:16px">🔒 Not Connected</h1><p style="color:var(--tx2)">Open this page through your Tailscale network:<br><code style="font-size:14px">https://pib-mini.YOUR-TAILNET.ts.net</code></p></div>';
    throw new Error('Not authenticated');
  }
  if (!res.ok) throw new Error(`API ${res.status}`);
  return res.json();
}

let authenticatedMember = null;
async function bootstrapIdentity() {
  try {
    // Use fetch directly to avoid api()'s 401 page takeover
    const res = await fetch('/api/whoami?view_as=' + currentActor);
    if (!res.ok) { console.warn('Identity: not authenticated (dev mode — using actor picker)'); return; }
    const d = await res.json();
    authenticatedMember = d;
    if (d.memberId && !localStorage.getItem('pib-actor-override')) {
      currentActor = d.memberId;
    }
    if (d.role === 'child') currentActor = d.memberId;
  } catch(e) { console.error('Identity bootstrap failed:', e); }
}
const GET = (p) => api(p);
const POST = (p, body) => api(p, { method:'POST', body: JSON.stringify(body) });

// ── SVG Icons ──
const ICONS = {
  sun:'<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>',
  'check-square':'<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>',
  calendar:'<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>',
  list:'<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>',
  'message-circle':'<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>',
  trophy:'<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"/></svg>',
  users:'<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>',
  inbox:'<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><polyline points="22 12 16 12 14 15 10 15 8 12 2 12"/><path d="M5.45 5.11L2 12v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-6l-3.45-6.89A2 2 0 0 0 16.76 4H7.24a2 2 0 0 0-1.79 1.11z"/></svg>',
  'book-open':'<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>',
  settings:'<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>',
};

// ── Helpers ──
function esc(s) { const d=document.createElement('div'); d.textContent=s||''; return d.innerHTML; }
function memberName(id) { return MEMBERS.find(m=>m.id===id)?.name || '\u2014'; }
function todayISO() { return new Date().toISOString().split('T')[0]; }
function greeting() { const h=new Date().getHours(); return h<12?'Good morning':h<18?'Good afternoon':'Good evening'; }
function loading(label) { return `<div style="text-align:center;padding:60px"><div class="spinner"></div>${label?`<div style="margin-top:12px;font-size:13px;color:var(--tx3)">${esc(label)}</div>`:''}</div>`; }

// ── Keyboard Nav ──
document.addEventListener('keydown', (e) => {
  if (currentPage !== 'today' || currentActor !== 'm-james') return;
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
  
  if (e.key === 'ArrowRight') { e.preventDefault(); navigateStream(1); }
  else if (e.key === 'ArrowLeft') { e.preventDefault(); navigateStream(-1); }
  else if (e.key === 'Enter') { e.preventDefault(); completeCurrentStream(); }
  else if (e.key === 'Escape') { e.preventDefault(); skipCurrentStream(); }
});

function navigateStream(delta) {
  const stream = lastKnownData.todayStream?.stream || [];
  streamIndex = Math.max(0, Math.min(stream.length - 1, streamIndex + delta));
  renderPage();
}

function completeCurrentStream() {
  const stream = lastKnownData.todayStream?.stream || [];
  const item = stream[streamIndex];
  if (item && item.type === 'task' && item.task?.id) {
    completeFromStream(item.task.id);
  }
}

function skipCurrentStream() {
  const stream = lastKnownData.todayStream?.stream || [];
  const item = stream[streamIndex];
  if (item && item.type === 'task' && item.task?.id) {
    skipFromStream(item.task.id);
  }
}

          </div>`).join('')}

}

  const m = document.getElementById('main');
  try {
    const data = await GET(`/api/schedule?date=${todayISO()}`);
    const events = data.events||[];
    const hours = Array.from({length:15},(_,i)=>i+7);
    const cols = [{id:'m-james',name:'James',color:'var(--pink)'},{id:'m-laura',name:'Laura',color:'var(--lav)'},{id:'all',name:'Family',color:'var(--teal)'}];
    const dateStr = new Date().toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'});
    m.innerHTML = `<div class="fi">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:24px">
        <div><h1 class="page-title" style="margin-bottom:0">Schedule</h1><p style="font-size:14px;color:var(--tx2);margin-top:4px">${dateStr}</p></div>
      </div>
      ${data.custody?`<div style="padding:10px 16px;border-radius:10px;background:var(--lav-bg);margin-bottom:20px;font-size:13px;color:var(--lav);font-weight:500">${esc(data.custody)}</div>`:''}
      <div class="card-flat" style="padding:0;overflow:hidden">
        <div style="display:grid;grid-template-columns:60px repeat(3,1fr);border-bottom:2px solid var(--bd)">
          <div style="padding:12px 8px;font-size:11px;font-weight:600;color:var(--tx3);text-align:center">TIME</div>
          ${cols.map(c=>`<div style="padding:12px 14px;font-size:12px;font-weight:600;color:${c.color};text-align:center;text-transform:uppercase;letter-spacing:.3px">${c.name}</div>`).join('')}
        </div>
        ${hours.map(h=>`<div style="display:grid;grid-template-columns:60px repeat(3,1fr);min-height:48px;border-bottom:1px solid var(--bg-input)">
          <div style="padding:4px 8px;font-size:11px;font-family:var(--mono);color:var(--tx4);text-align:center">${h>12?h-12:h}${h>=12?'pm':'am'}</div>
          ${cols.map(mc=>{
            const ev=events.find(s=>parseInt((s.time||'').split(':')[0])===h&&(s.member===mc.id||s.member==='all'));
            if(!ev) return '<div></div>';
            return `<div style="padding:4px 6px"><div style="padding:8px 12px;border-radius:8px;font-size:13px;font-weight:500;background:${mc.color}18;border-left:3px solid ${mc.color}"><div>${esc(ev.title)}</div><div style="font-size:11px;color:var(--tx3);margin-top:2px">${esc(ev.time||'')}\u2013${esc(ev.end||'')}</div></div></div>`;
          }).join('')}
        </div>`).join('')}
      </div></div>`;
  } catch(e) { m.innerHTML = `<div class="fi"><h1 class="page-title">Schedule</h1><div class="card-flat" style="text-align:center;padding:48px;color:var(--tx3)">Could not load schedule.</div></div>`; }
}

// ── LISTS ──
async function renderLists() {
  const m = document.getElementById('main');
  let listTab = 'grocery';
  const tabDefs = [{id:'grocery',label:'🛒 Grocery'},{id:'honey-do',label:'🔨 Honey-Do'},{id:'packing',label:'👶 Baby Packing'}];
  async function load(t) {
    listTab = t||listTab;
    try {
      const data = await GET(`/api/lists/${listTab}`);
      const items = data.items||[];
      m.innerHTML = `<div class="fi" style="max-width:600px;margin:0 auto">
        <h1 class="page-title">Lists</h1>
        <div class="pill-tabs">${tabDefs.map(td=>`<button class="pill ${td.id===listTab?'active':''}" onclick="window._listTab('${td.id}')">${td.label}</button>`).join('')}</div>
        <div style="display:flex;gap:8px;margin-bottom:20px">
          <input id="list-input" placeholder="Quick add..." onkeydown="if(event.key==='Enter')window._listAdd()">
          <button class="btn-p" onclick="window._listAdd()" style="min-width:70px">Add</button>
        </div>
        <div class="card-flat" style="padding:0">
          ${items.map((item,i)=>`<div onclick="window._listToggle('${esc(item.id)}')" style="display:flex;align-items:center;gap:14px;padding:14px 20px;border-bottom:${i<items.length-1?'1px solid var(--bd)':'none'};cursor:pointer">
            <div style="width:22px;height:22px;border-radius:6px;border:2px solid ${item.done?'var(--grn)':'var(--bd)'};background:${item.done?'var(--grn)':'transparent'};display:flex;align-items:center;justify-content:center;flex-shrink:0">${item.done?'<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>':''}</div>
            <span style="font-size:15px;text-decoration:${item.done?'line-through':'none'};color:${item.done?'var(--tx3)':'var(--tx)'}">${esc(item.text)}</span>
          </div>`).join('')}
        </div></div>`;
    } catch(e) { m.innerHTML = `<div class="fi"><h1 class="page-title">Lists</h1><div class="card-flat" style="text-align:center;padding:48px;color:var(--tx3)">Could not load list.</div></div>`; }
  }
  window._listTab = load;
  window._listAdd = async()=>{ const inp=document.getElementById('list-input'); if(!inp||!inp.value.trim()) return; try{ await POST(`/api/lists/${listTab}/items`,{text:inp.value}); load(listTab); }catch(e){console.error(e);} };
  window._listToggle = async(id)=>{ try{ await POST(`/api/lists/${listTab}/items/${id}/toggle`,{}); load(listTab); }catch(e){console.error(e);} };
  load(listTab);
}

// ── COMMS ──
let commsFilter = 'all';
let commsChannelFilter = null;
let commsIdentityPicker = null;

async function renderComms() {
  const m = document.getElementById('main');
  
  async function load() {
    m.innerHTML = loading('Loading comms...');
    try {
      // Fetch channels with member access
      const channelsData = await GET(`/api/channels/member/${currentActor}`);
      const channels = channelsData.channels || [];
      
      // Fetch counts for badge
      const countsData = await GET(`/api/comms/counts`);
      const counts = countsData || {};
      
      // Fetch inbox items
      let url = `/api/comms/inbox`;
      const params = [];
      if (commsChannelFilter) params.push(`channel=${commsChannelFilter}`);
      if (commsFilter && commsFilter !== 'all') {
        if (commsFilter === 'needs_response') params.push('needs_response=true');
        else if (commsFilter === 'urgent') params.push('response_urgency=urgent&needs_response=true');
        else if (commsFilter === 'drafts') params.push('draft_status=pending');
        else if (commsFilter === 'snoozed') params.push('snoozed=true');
      }
      if (params.length) url += '?' + params.join('&');
      
      const inboxData = await GET(url);
      const items = inboxData.items || [];
      
      // Group channels by category
      const channelsByCategory = {
        bidirectional: channels.filter(c => c.category === 'conversational'),
        inbound: channels.filter(c => c.category === 'broadcast'),
        privileged: channels.filter(c => c.access_level === 'admin'),
        capture: channels.filter(c => c.category === 'capture'),
      };
      
      // Group items by batch window within urgency
      const itemsByUrgency = {
        urgent: items.filter(i => i.response_urgency === 'urgent'),
        timely: items.filter(i => i.response_urgency === 'timely'),
        normal: items.filter(i => i.response_urgency === 'normal' || !i.response_urgency),
      };
      
      m.innerHTML = `<div class="fi" style="display:flex;gap:20px">
        <!-- Channel Sidebar -->
        <div style="width:240px;flex-shrink:0">
          <h2 style="font-size:18px;font-weight:600;font-family:var(--head);margin-bottom:16px">Channels</h2>
          
          ${Object.entries(channelsByCategory).map(([cat, chans]) => chans.length ? `
            <div style="margin-bottom:20px">
              <div style="font-size:11px;font-weight:600;color:var(--tx3);letter-spacing:.5px;text-transform:uppercase;margin-bottom:8px">${esc(cat)}</div>
              ${chans.map(ch => `
                <div onclick="window._filterChannel('${esc(ch.id)}')" 
                     style="padding:8px 12px;border-radius:8px;margin-bottom:4px;cursor:pointer;border:1px solid ${commsChannelFilter===ch.id?'var(--pink)':'transparent'};background:${commsChannelFilter===ch.id?'var(--pink-bg)':'transparent'};transition:all .15s"
                     onmouseover="this.style.background='var(--bg-hover)'" 
                     onmouseout="this.style.background='${commsChannelFilter===ch.id?'var(--pink-bg)':'transparent'}'">
                  <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px">
                    <span style="font-size:16px">${esc(ch.icon || '💬')}</span>
                    <span style="font-size:13px;font-weight:500;flex:1">${esc(ch.display_name)}</span>
                    <div style="width:6px;height:6px;border-radius:50%;background:${ch.health_status==='active'?'var(--grn)':ch.health_status==='degraded'?'var(--warn)':'var(--err)'};flex-shrink:0"></div>
                  </div>
                  <div style="display:flex;align-items:center;gap:6px;font-size:11px">
                    <span class="badge ${ADAPTER_BADGE[ch.adapter_id] || 'badge-info'}" style="font-size:10px;padding:2px 6px">${esc(ch.adapter_id || '')}</span>
                    <span class="badge badge-${ch.access_level==='admin'?'pink':ch.access_level==='write'?'lav':'teal'}" style="font-size:10px;padding:2px 6px">${esc(ch.access_level || 'read')}</span>
                    ${(counts.by_channel && counts.by_channel[ch.id]) ? `<span style="color:var(--pink);font-weight:600">${counts.by_channel[ch.id]}</span>` : ''}
                  </div>
                </div>
              `).join('')}
            </div>
          ` : '').join('')}
        </div>
        
        <!-- Main Inbox -->
        <div style="flex:1;min-width:0">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px">
            <h1 class="page-title" style="margin-bottom:0">Comms Inbox</h1>
            <div style="display:flex;align-items:center;gap:8px">
              <span id="comms-badge" class="badge badge-pink">${counts.needs_response || 0} need response</span>
              ${counts.urgent > 0 ? `<span class="badge badge-err">${counts.urgent} urgent</span>` : ''}
            </div>
          </div>
          
          <div class="pill-tabs" style="margin-bottom:20px">
            ${['all','needs_response','urgent','drafts','snoozed'].map(f => `
              <button class="pill ${f===commsFilter?'active':''}" onclick="window._filterComms('${f}')">
                ${f.replace(/_/g,' ')}
                ${f==='drafts'&&counts.drafts_pending>0?` (${counts.drafts_pending})`:f==='urgent'&&counts.urgent>0?` (${counts.urgent})`:''}
              </button>
            `).join('')}
          </div>
          
          ${items.length === 0 ? `
            <div class="card-flat" style="text-align:center;padding:60px;color:var(--tx3)">
              <div style="font-size:48px;margin-bottom:16px">📭</div>
              <div style="font-size:16px;font-weight:500;margin-bottom:8px">No messages</div>
              <div style="font-size:14px">
                ${commsFilter === 'all' ? 'Your inbox is empty.' : 
                  commsFilter === 'needs_response' ? 'No messages need a response.' :
                  commsFilter === 'urgent' ? 'No urgent messages.' :
                  commsFilter === 'drafts' ? 'No pending drafts.' :
                  'No snoozed messages.'}
              </div>
            </div>
          ` : `
            <!-- Urgency Groups -->
            ${Object.entries(itemsByUrgency).map(([urgency, urgentItems]) => urgentItems.length ? `
              <div style="margin-bottom:24px">
                <div style="font-size:12px;font-weight:600;color:var(--tx3);letter-spacing:.5px;text-transform:uppercase;margin-bottom:12px;display:flex;align-items:center;gap:8px">
                  ${urgency === 'urgent' ? '🔴' : urgency === 'timely' ? '🟡' : '⚪'} ${urgency}
                </div>
                
                <!-- Cards within urgency -->
                ${urgentItems.map(item => {
                  const isDraft = item.draft_status === 'pending';
                  const isMetadataOnly = item.access_level === 'metadata';
                  
                  return `
                    <div class="card" style="margin-bottom:12px;${isDraft?'border-left:4px solid var(--lav)':''}">
                      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px">
                        <div style="flex:1">
                          <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">
                            <span style="font-size:16px">${esc(item.channel_icon || '💬')}</span>
                            <span style="font-weight:600;font-size:15px">${isMetadataOnly ? '[Private]' : esc(item.summary || item.subject || 'No subject')}</span>
                            ${isDraft ? '<span class="badge badge-lav" style="font-size:11px">DRAFT</span>' : ''}
                          </div>
                          
                          ${!isMetadataOnly && item.subject ? `
                            <div style="font-size:13px;color:var(--tx3);margin-bottom:4px">Subject: ${esc(item.subject)}</div>
                          ` : ''}
                          
                          ${!isMetadataOnly && item.body_snippet ? `
                            <div style="font-size:14px;color:var(--tx2);line-height:1.5;margin-bottom:8px">${esc(item.body_snippet)}</div>
                          ` : ''}
                          
                          ${isMetadataOnly ? `
                            <div style="font-size:13px;color:var(--tx3);padding:12px;background:var(--bg-input);border-radius:8px;margin-bottom:8px">
                              🔒 Metadata-only access — content hidden for privacy
                            </div>
                          ` : ''}
                          
                          ${isDraft && item.draft_response ? `
                            <div id="draft-${esc(item.id)}" style="background:var(--lav-bg);border:1px solid var(--lav);border-radius:8px;padding:12px;margin-bottom:8px;position:relative">
                              <div style="font-size:11px;font-weight:600;color:var(--lav);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px">Draft Response</div>
                              <div contenteditable="true" style="font-size:14px;line-height:1.6;outline:none;min-height:60px">${esc(item.draft_response)}</div>
                              <div style="font-size:12px;color:var(--tx3);margin-top:8px;font-style:italic">
                                as ${MEMBERS.find(m=>m.id===currentActor)?.name || 'You'} (Personal) via ${esc(item.channel_name || 'Channel')}
                              </div>
                            </div>
                          ` : ''}
                          
                          <div style="font-size:12px;color:var(--tx3)">
                            <span>${esc(item.channel_name || 'Unknown')}</span> &middot; 
                            <span>${esc(item.created_at || '')}</span>
                            ${item.batch_window ? ` &middot; <span>Batch: ${esc(item.batch_window)}</span>` : ''}
                          </div>
                        </div>
                      </div>
                      
                      <!-- Actions -->
                      <div style="display:flex;gap:8px;flex-wrap:wrap">
                        ${isDraft ? `
                          <button class="btn-g btn-sm" onclick="window._sendDraft('${esc(item.id)}')">✅ Send</button>
                          <button class="btn-d btn-sm" onclick="window._rejectDraft('${esc(item.id)}')">❌ Reject</button>
                        ` : !isMetadataOnly && item.needs_response ? `
                          <button class="btn-p btn-sm" onclick="window._draftReply('${esc(item.id)}')">✍️ Draft</button>
                          <button class="btn-s btn-sm" onclick="window._archiveComm('${esc(item.id)}')">Archive</button>
                          <button class="btn-s btn-sm" onclick="window._snoozeComm('${esc(item.id)}')">⏰ Snooze</button>
                        ` : `
                          <button class="btn-s btn-sm" onclick="window._archiveComm('${esc(item.id)}')">Archive</button>
                        `}
                      </div>
                    </div>
                  `;
                }).join('')}
              </div>
            ` : '').join('')}
          `}
        </div>
      </div>
      
      <!-- Identity Picker Modal (hidden until needed) -->
      <div id="identity-picker-modal" style="display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);z-index:1000;align-items:center;justify-content:center">
        <div class="card" style="max-width:500px;margin:20px">
          <h3 style="font-size:18px;font-weight:600;font-family:var(--head);margin-bottom:16px">Choose Identity</h3>
          <p style="font-size:14px;color:var(--tx2);margin-bottom:16px">This message requires choosing an outbound identity:</p>
          <div id="identity-picker-options" style="display:grid;gap:8px;margin-bottom:16px"></div>
          <div style="display:flex;gap:8px;justify-content:flex-end">
            <button class="btn-s" onclick="window._closeIdentityPicker()">Cancel</button>
          </div>
        </div>
      </div>`;
      
      // Set badge refresh
      if (!window.commsBadgeInterval) {
        window.commsBadgeInterval = setInterval(async () => {
          try {
            const c = await GET('/api/comms/counts');
            const badge = document.getElementById('comms-badge');
            if (badge) badge.textContent = `${c.needs_response || 0} need response`;
          } catch(e) { console.error(e); }
        }, 60000); // 60s
      }
      
    } catch(e) {
      m.innerHTML = `<div class="fi"><h1 class="page-title">Comms Inbox</h1><div class="card-flat" style="text-align:center;padding:48px;color:var(--tx3)">Could not load inbox. ${esc(e.message)}</div></div>`;
    }
  }
  
  // Action handlers
  window._filterComms = (filter) => { commsFilter = filter; load(); };
  window._filterChannel = (channelId) => { commsChannelFilter = commsChannelFilter === channelId ? null : channelId; load(); };
  
  window._draftReply = async (id) => {
    try {
      await POST(`/api/comms/${id}/draft`, {});
      load();
    } catch(e) { alert('Draft generation requires LLM integration'); }
  };
  
  window._sendDraft = async (id) => {
    const draftDiv = document.getElementById(`draft-${id}`);
    const editedText = draftDiv?.querySelector('[contenteditable]')?.textContent;
    try {
      const res = await POST(`/api/comms/${id}/send`, editedText ? { edited_text: editedText } : {});
      if (res.identity_unresolved) {
        commsIdentityPicker = { id, text: editedText, identities: res.available_identities || [] };
        showIdentityPicker();
      } else {
        load();
      }
    } catch(e) { alert('Send failed: ' + e.message); }
  };
  
  window._rejectDraft = async (id) => {
    if (!confirm('Reject this draft?')) return;
    try {
      await POST(`/api/comms/${id}/reject`, {});
      load();
    } catch(e) { alert('Reject failed: ' + e.message); }

// ── CHAT (with SSE streaming) ──
function renderChat() {
  const m = document.getElementById('main');
  const isChildChat = authenticatedMember?.role === 'child' || MEMBERS.find(m=>m.id===currentActor)?.viewMode === 'child';
  const chips = isChildChat ? ['today','help','schedule'] : ['today','now','grocery list','schedule','status','capture:','recipe:','diff','help'];
  function draw() {
    m.innerHTML = `<div class="fi" style="display:flex;flex-direction:column;height:calc(100vh - 56px);max-width:700px;margin:0 auto">
      <h1 class="page-title" style="flex-shrink:0">Chat with Poopsy</h1>
      <div id="chat-msgs" style="flex:1;overflow:auto;margin-bottom:12px;display:flex;flex-direction:column;gap:10px">
        ${chatMessages.map((msg,i)=>`<div style="display:flex;justify-content:${msg.role==='user'?'flex-end':'flex-start'}">
          <div style="max-width:80%;padding:12px 16px;border-radius:16px;font-size:15px;line-height:1.5;background:${msg.role==='user'?'var(--pink)':'var(--bg-card)'};color:${msg.role==='user'?'#fff':'var(--tx)'};border:${msg.role==='user'?'none':'1px solid var(--bd)'};border-bottom-right-radius:${msg.role==='user'?'4px':'16px'};border-bottom-left-radius:${msg.role==='user'?'16px':'4px'};box-shadow:${msg.role==='user'?'0 2px 8px rgba(232,160,191,0.3)':'var(--sh)'}">
            ${esc(msg.content)}${chatStreaming&&i===chatMessages.length-1&&msg.role==='assistant'?'<span style="animation:pulse 1s infinite">\u258C</span>':''}
            <div style="font-size:10px;margin-top:6px;opacity:.6">${esc(msg.ts||'')}</div>
          </div></div>`).join('')}
      </div>
      <div style="display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap;flex-shrink:0">
        ${chips.map(c=>`<button class="btn-s" style="padding:5px 14px;font-size:12px;border-radius:20px" onclick="window._chatSend('${esc(c)}')" ${chatStreaming?'disabled':''}>${c}</button>`).join('')}
      </div>
      <div style="display:flex;gap:10px;flex-shrink:0;padding-bottom:8px">
        <input id="chat-input" placeholder="Talk to Poopsy..." style="font-size:15px;padding:14px 18px;border-radius:28px;flex:1" ${chatStreaming?'disabled':''} onkeydown="if(event.key==='Enter')window._chatSend()">
        <button class="btn-p" style="width:48px;height:48px;border-radius:50%;display:flex;align-items:center;justify-content:center;padding:0" onclick="window._chatSend()" ${chatStreaming?'disabled':''}>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        </button>
      </div></div>`;
    const el = document.getElementById('chat-msgs');
    if(el) el.scrollTop = el.scrollHeight;
  }
  
  window._chatSend = async function(text) {
    const inp = document.getElementById('chat-input');
    const t = text || (inp?inp.value:'');
    if (!t.trim() || chatStreaming) return;
    const ts = new Date().toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'});
    chatMessages.push({role:'user',content:t,ts});
    if(inp) inp.value='';
    chatStreaming = true;
    
    // Add placeholder assistant message
    chatMessages.push({role:'assistant',content:'',ts:new Date().toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'})});
    draw();
    
    try {
      // Try SSE streaming first
      const streamUrl = `/api/chat/stream?session_id=${chatSessionId}&message=${encodeURIComponent(t)}`;
      const eventSource = new EventSource(streamUrl);
      let streamedContent = '';
      
      eventSource.onmessage = (e) => {
        try {
          const data = JSON.parse(e.data);
          if (data.done) {
            eventSource.close();
            chatStreaming = false;
            chatMessages[chatMessages.length-1].content = streamedContent || data.content || '(no response)';
            draw();
          } else if (data.token) {
            streamedContent += data.token;
            chatMessages[chatMessages.length-1].content = streamedContent;
            draw();
          } else if (data.content) {
            // Non-streaming fallback
            eventSource.close();
            chatStreaming = false;
            chatMessages[chatMessages.length-1].content = data.content;
            draw();
          }
        } catch(err) {
          console.error('SSE parse error:', err);
        }
      };
      
      eventSource.onerror = async (err) => {
        console.warn('SSE failed, falling back to POST');
        eventSource.close();
        // Fallback to POST
        try {
          const res = await POST('/api/chat/send',{message:t,session_id:chatSessionId});
          chatMessages[chatMessages.length-1].content = res.reply||res.content||'(no response)';
        } catch(e2) {
          chatMessages[chatMessages.length-1].content = 'Connection lost. Try again.';
        }
        chatStreaming = false;
        draw();
      };
      
    } catch(e) {
      chatMessages[chatMessages.length-1].content = 'Connection lost. Try again.';
      chatStreaming = false;
      draw();
    }
  };
  draw();
}

function _timeAgo(dateStr) {
  const now = new Date();
  const then = new Date(dateStr);
  const diffMs = now - then;
  const diffMins = Math.floor(diffMs / 60000);
  if (diffMins < 1) return 'just now';
  if (diffMins < 60) return `${diffMins}m ago`;
  const diffHours = Math.floor(diffMins / 60);
  if (diffHours < 24) return `${diffHours}h ago`;
  const diffDays = Math.floor(diffHours / 24);
  if (diffDays < 7) return `${diffDays}d ago`;
  const diffWeeks = Math.floor(diffDays / 7);
  if (diffWeeks < 4) return `${diffWeeks}w ago`;
  const diffMonths = Math.floor(diffDays / 30);
  return `${diffMonths}mo ago`;
}

async function renderCaptures() {
  const m = document.getElementById('main');
  m.innerHTML = loading('Loading captures...');
  
  try {
    const [stats, notebooksData] = await Promise.all([
      GET('/api/captures/stats'),
      GET(`/api/captures?group_by=notebook&member=${currentActor}`)
    ]);
    
    const notebookCounts = notebooksData.notebook_counts || [];
    
    // Render view switcher + sidebar + content
    m.innerHTML = `<div class="fi">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px">
        <h1 class="page-title" style="margin-bottom:0">Captures</h1>
        <button class="btn-p" onclick="window._capQuickCapture()">+ Quick Capture</button>
      </div>
      
      <div class="pill-tabs" style="margin-bottom:20px">
        <button class="pill ${capturesView === 'browse' ? 'active' : ''}" onclick="window._capView('browse')">📚 Browse</button>
        <button class="pill ${capturesView === 'recipes' ? 'active' : ''}" onclick="window._capView('recipes')">🍽️ Recipes</button>
        <button class="pill ${capturesView === 'triage' ? 'active' : ''}" onclick="window._capView('triage')">⏳ Triage (${stats.inbox_count || 0})</button>
      </div>
      
      <div style="display:grid;grid-template-columns:220px 1fr;gap:20px">
        <div id="cap-sidebar"></div>
        <div id="cap-content"></div>
      </div>
    </div>`;
    
    // Render sidebar
    const notebooks = [
      { slug: 'all', name: 'All Captures', icon: '📚', count: stats.total || 0 },
      { slug: 'inbox', name: 'Inbox', icon: '📥', count: notebookCounts.find(n => n.notebook === 'inbox')?.count || 0 },
      { slug: 'kitchen', name: 'Kitchen', icon: '🍽️', count: notebookCounts.find(n => n.notebook === 'kitchen')?.count || 0 },
      { slug: 'ideas', name: 'Ideas', icon: '💡', count: notebookCounts.find(n => n.notebook === 'ideas')?.count || 0 },
      { slug: 'reference', name: 'Reference', icon: '📚', count: notebookCounts.find(n => n.notebook === 'reference')?.count || 0 },
      { slug: 'kids', name: 'Kids', icon: '👶', count: notebookCounts.find(n => n.notebook === 'kids')?.count || 0 },
      { slug: 'home', name: 'Home', icon: '🏠', count: notebookCounts.find(n => n.notebook === 'home')?.count || 0 },
      { slug: 'health', name: 'Health', icon: '💊', count: notebookCounts.find(n => n.notebook === 'health')?.count || 0 },
      { slug: 'work', name: 'Work', icon: '💼', count: notebookCounts.find(n => n.notebook === 'work')?.count || 0 },
      { slug: 'money', name: 'Money', icon: '💰', count: notebookCounts.find(n => n.notebook === 'money')?.count || 0 },
    ];
    
    document.getElementById('cap-sidebar').innerHTML = `<div>
      <div style="margin-bottom:16px">
        <input id="cap-search" placeholder="Search..." style="width:100%;font-size:13px" onkeydown="if(event.key==='Enter')window._capSearch()">
      </div>
      ${notebooks.map(nb => `
        <button class="nb-btn ${capturesNotebook === nb.slug ? 'active' : ''}" style="width:100%;display:flex;justify-content:space-between;align-items:center;margin-bottom:4px" onclick="window._capNb('${nb.slug}')">
          <span>${nb.icon} ${nb.name}</span>
          <span style="font-size:11px;font-family:var(--mono);color:var(--tx4)">${nb.count}</span>
        </button>
      `).join('')}
    </div>`;
    
    // Render content based on view
    if (capturesView === 'browse') {
      const filter = capturesNotebook === 'all' ? {} : { notebook: capturesNotebook };
      if (capturesSearch) filter.search = capturesSearch;
      const queryStr = new URLSearchParams(filter).toString();
      const data = await GET(`/api/captures?${queryStr}&member=${currentActor}`);
      const captures = data.captures || [];
      
      document.getElementById('cap-content').innerHTML = captures.length > 0
        ? captures.map(c => renderCaptureCard(c)).join('')
        : `<div style="text-align:center;padding:60px;color:var(--tx3)">No captures found</div>`;
        
    } else if (capturesView === 'recipes') {
      const data = await GET(`/api/captures/recipes?member=${currentActor}`);
      const recipes = data.recipes || [];
      
      document.getElementById('cap-content').innerHTML = `<div>
        ${renderRecipeFilters([])}
        ${recipes.length > 0
          ? recipes.map(r => renderRecipeCard(r)).join('')
          : `<div style="text-align:center;padding:60px;color:var(--tx3)">No recipes yet</div>`}
      </div>`;
      
    } else if (capturesView === 'triage') {
      const data = await GET(`/api/captures?org_status=raw&member=${currentActor}`);
      const rawCaptures = data.captures || [];
      triageIndex = Math.min(triageIndex, Math.max(0, rawCaptures.length - 1));
      document.getElementById('cap-content').innerHTML = renderTriageView(rawCaptures);
    }
    
  } catch (e) {
    m.innerHTML = `<div class="fi"><h1 class="page-title">Captures</h1><div class="card-flat" style="text-align:center;padding:48px;color:var(--tx3)">Could not load captures: ${esc(e.message)}</div></div>`;
  }
}

// Capture action handlers
window._capView = (view) => { capturesView = view; triageIndex = 0; renderPage(); };
window._capNb = (nb) => { capturesNotebook = nb; capturesView = 'browse'; renderPage(); };
window._capSearch = () => { capturesSearch = document.getElementById('cap-search')?.value || ''; renderPage(); };
window._capPin = async (id, pin) => { try { await POST(`/api/captures/${id}`, { pinned: pin ? 1 : 0 }); renderPage(); } catch (e) { console.error(e); } };
window._capArchive = async (id) => { try { await POST(`/api/captures/${id}`, { archived: 1 }); renderPage(); } catch (e) { console.error(e); } };
window._capMove = async (id) => { const nb = prompt('Move to notebook:'); if (nb) { try { await POST(`/api/captures/${id}`, { notebook: nb }); renderPage(); } catch (e) { console.error(e); } } };
window._capMadeIt = async (id) => { try { await POST(`/api/captures/${id}/made-it`, {}); renderPage(); } catch (e) { console.error(e); } };
window._capQuickCapture = async () => { const text = prompt('Quick capture:'); if (text) { try { await POST('/api/capture', { text, member_id: currentActor }); renderPage(); } catch (e) { console.error(e); } } };
window._capConfirmOrg = async (id, notebook) => { try { await POST(`/api/captures/${id}`, { notebook }); await POST(`/api/captures/${id}/confirm`, {}); triageIndex++; renderPage(); } catch (e) { console.error(e); } };

      }
    } catch(e) {
      sc.innerHTML = `<div class="card-flat" style="text-align:center;padding:48px;color:var(--tx3)">Could not load ${SETTINGS_LABELS[settingsTab]} data. ${esc(e.message)}</div>`;
    }
  }
  window._settingsTab = load;
  load(settingsTab);
}

// ── Boot ──
if (window.location.hash === '#scoreboard' || window.location.hash === '#/scoreboard') {
  renderTVScoreboard();
} else {
  initApp();
}
</script>
</body>
</html>
