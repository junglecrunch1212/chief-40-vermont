# governance.yaml — Action-level governance gates
#
# Gates control what happens when an agent invokes a CLI write command.
#   true     = auto-approve (no confirmation needed)
#   confirm  = queue for user confirmation before executing
#   off      = blocked entirely for this action
#
version: "1.0"
updated: "2026-03-03"

# ═══════════════════════════════════════════════════════════
# ACTION GATES
# ═══════════════════════════════════════════════════════════

action_gates:
  # Task operations
  task_create: true
  task_complete: true
  task_update: confirm
  task_snooze: confirm
  # Calendar operations
  calendar_hold_create: confirm
  calendar_hold_confirm: confirm
  calendar_hold_reject: confirm
  # Recurring tasks
  recurring_mark_done: true
  recurring_mark_skip: true
  # State tracking
  state_update: true           # Meds, sleep, energy — always auto-approve
  # Capture & webhooks
  capture_create: true
  webhook_receive: true        # Inbound messages always processed
  # Proactive engine
  run_proactive_checks: true   # Cron-triggered, always auto-approve
  # Lists
  list_item_toggle: true       # Grocery/shopping list items — auto-approve
  # Approvals (decisions)
  approval_decide: confirm     # Laura's decisions require explicit confirm
  # Config management
  config_set: confirm          # System config changes require confirmation
  # Coaching protocols
  coaching_toggle: confirm     # Enabling/disabling coaching protocols
  # Household management
  member_add: confirm          # Adding new household members
  member_deactivate: confirm   # Deactivating members
  # Chores (child-facing)
  chore_toggle: true           # Charlie checking off chores — auto-approve
  # Channel management
  channel_enable: confirm      # Enabling channels requires approval
  channel_disable: confirm
  channel_add: confirm
  channel_update: confirm
  channel_grant_access: confirm
  channel_revoke_access: confirm
  channel_setup_member: confirm
  # Comms/inbox operations
  comms_approve_draft: confirm # Approving drafted messages
  comms_respond: true          # Marking comm as responded
  comms_snooze: true           # Snoozing comm items
  # Sensor ingest
  sensor_ingest: true          # Device sensor data — auto-approve
  # Member settings
  member_settings_set: confirm # Member setting changes require confirmation
  # Calendar ingest
  calendar_ingest: true        # Calendar sync — auto-approve
  # Chat
  chat_stream: true            # Chat messages — auto-approve

# Agent-specific overrides (merged on top of defaults above)
agent_overrides:
  coach:
    task_create: off           # Coach doesn't create tasks
    calendar_hold_create: off  # Coach doesn't touch calendar
  scoreboard:
    task_create: off
    task_complete: off
    task_update: off
    calendar_hold_create: off
  proactive:
    task_create: off
    task_update: off

# ═══════════════════════════════════════════════════════════
# RATE LIMITS (per source)
# ═══════════════════════════════════════════════════════════

rate_limits:
  # Per-source webhook limits (requests per minute)
  twilio: 30                   # SMS inbound
  siri: 20                     # Siri Shortcuts
  bluebubbles: 60              # iMessage bridge
  sheets: 30                   # Google Sheets webhook
  web_chat: 10                 # Console chat interface
  # Generic write limits
  writes_per_minute: 20        # Max writes from console per user per minute
  alert_threshold: 10          # Alert Bossman after this many writes in 60s

# ═══════════════════════════════════════════════════════════
# OUTPUT SANITIZATION
# ═══════════════════════════════════════════════════════════

output_sanitization:
  strip_patterns:
    - "sk-ant-[a-zA-Z0-9_-]+"          # Anthropic API keys
    - "ANTHROPIC_API_KEY=[^\\s]+"       # Env var leaks
    - "claude-[0-9]+-[0-9]+-[0-9]+"    # Model IDs (prevent version leak)
  redact_for_non_dev:
    - laura_work_calendar_titles         # Privacy fence: Gene 4
    - api_key_values
    - model_identifiers
